<style>
    /* Footer siempre al fondo: el body reserva espacio abajo y el footer
       se ancla ahí en absoluto. No altera el layout del resto de la página
       (a diferencia de volver el body flex, que rompe los margin auto). */
    body:has(.site-footer:not(.site-footer--fixed)) {
        position: relative;
        min-height: 100vh;
        box-sizing: border-box;
        padding-bottom: 96px;
    }

    .site-footer {
        padding: 16px 12px 20px;
        text-align: center;
        font-size: 0.78rem;
        letter-spacing: 0.02em;
        color: rgba(226, 234, 248, 0.42);
    }

    .site-footer:not(.site-footer--fixed) {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
    }

    @media (max-width: 700px) {
        body:has(.site-footer:not(.site-footer--fixed)) {
            padding-bottom: 130px;
        }
    }

    .site-footer a {
        color: rgba(226, 234, 248, 0.58);
        text-decoration: none;
        border-bottom: 1px solid rgba(226, 234, 248, 0.22);
        transition: color 0.2s ease, border-color 0.2s ease;
    }

    .site-footer a:hover {
        color: rgba(238, 243, 251, 0.92);
        border-color: rgba(238, 243, 251, 0.5);
    }

    .site-footer .footer-dot {
        margin: 0 7px;
        opacity: 0.55;
    }

    /* Para páginas cuyo body centra con flex (home): fuera del flujo,
       anclado abajo, sin alterar el centrado de la tarjeta principal. */
    .site-footer--fixed {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        margin: 0;
        padding: 12px;
        z-index: 5;
    }

    /* El home en móvil ocupa el 100% de la pantalla: no hay sitio. */
    @media (max-width: 767px), (max-height: 640px) {
        .site-footer--fixed {
            display: none;
        }
    }
</style>
<footer class="site-footer{% if footer_fixed %} site-footer--fixed{% endif %}">
    © {% now "Y" %} johanfer.com<span class="footer-dot">·</span>Servidor casero transmitiendo desde Raspberry Pi<span class="footer-dot">·</span><a href="https://github.com/Johanfer12/johanfer.com" target="_blank" rel="noopener noreferrer">GitHub</a>
</footer>
