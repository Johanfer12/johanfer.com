{% load static %}
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Música</title>
    <meta name="description" content="Playlist de música de Johan en Spotify.">
    <link rel="canonical" href="{{ request.scheme }}://{{ request.get_host }}{{ request.path }}">
    <meta property="og:site_name" content="{{ site_name }}">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Mi Música | {{ site_name }}">
    <meta property="og:description" content="Playlist de música de Johan en Spotify.">
    <meta property="og:url" content="{{ request.scheme }}://{{ request.get_host }}{{ request.path }}">
    <meta property="og:image" content="{{ request.scheme }}://{{ request.get_host }}{% static 'Img/spotify-icon.svg' %}">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Mi Música | {{ site_name }}">
    <meta name="twitter:description" content="Playlist de música de Johan en Spotify.">
    <meta name="twitter:image" content="{{ request.scheme }}://{{ request.get_host }}{% static 'Img/spotify-icon.svg' %}">
    <link rel="icon" href="{% static 'favicon.ico' %}" type="image/x-icon">
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
    <link rel="stylesheet" href="{% static 'css/dashboard.css' %}">
</head>
<body class="has-header music-playlist-page">
    {% include 'header.html' %}
    
    <div class="content-container">
        <!-- Mensajes -->
        {% if messages %}
            {% for message in messages %}
                <div class="message {{ message.tags }}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <div class="playlist-layout">
            <div class="music-section playlist-section">
                <iframe
                    class="spotify-playlist-frame"
                    title="{{ spotify_playlist_title }}"
                    src="{{ spotify_playlist_embed_url }}"
                    allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
                    loading="lazy">
                </iframe>
            </div>
        </div>
    </div>
    <script src="{% static 'js/background_motion.js' %}"></script>
</body>
</html>
